<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Migration Tool - Field App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'URW DIN', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #00263A;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #00263A;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #003d5c;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .results-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            background: #f9f9f9;
            display: none;
        }

        .results-list.show {
            display: block;
        }

        .result-item {
            padding: 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
        }

        .result-item.success {
            background: #d4edda;
            color: #155724;
        }

        .result-item.error {
            background: #f8d7da;
            color: #721c24;
        }

        .result-item.skipped {
            background: #fff3cd;
            color: #856404;
        }

        .tab-container {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .helper-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Migration Tool</h1>
        <p class="subtitle">Add projects to your Field App</p>

        <div class="tab-container">
            <button class="tab active" data-tab="single">Add Single Project</button>
            <button class="tab" data-tab="batch">Add Multiple Projects</button>
        </div>

        <!-- Single Project Tab -->
        <div id="single" class="tab-content active">
            <div class="form-group">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" placeholder="e.g., Main Office Complex">
                <p class="helper-text">Enter the name of the project you want to add</p>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="createSingleProject()">Create Project</button>
                <button class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <!-- Batch Projects Tab -->
        <div id="batch" class="tab-content">
            <div class="form-group">
                <label for="projectList">Project Names (one per line)</label>
                <textarea id="projectList" placeholder="Project Alpha&#10;Project Beta&#10;Main Office Complex"></textarea>
                <p class="helper-text">Enter each project name on a new line</p>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="createBatchProjects()">Create All Projects</button>
                <button class="btn-secondary" onclick="clearBatchForm()">Clear</button>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage" class="status-message"></div>

        <!-- Progress -->
        <div id="progressContainer" class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">Processing...</div>
        </div>

        <!-- Results -->
        <div id="resultsList" class="results-list">
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            endpoint: 'https://vcmd32juabdkplgtfaleds5bke.appsync-api.us-west-2.amazonaws.com/graphql',
            apiKey: 'da2-kurejmc32bgevfw2nwmap4gx2e',
        };

        const CREATE_MUTATION = `
            mutation CreateProject($input: CreateProjectInput!) {
                createProject(input: $input) {
                    id
                    project_name
                    createdAt
                }
            }
        `;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        async function createProject(projectName) {
            try {
                const response = await fetch(CONFIG.endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': CONFIG.apiKey,
                    },
                    body: JSON.stringify({
                        query: CREATE_MUTATION,
                        variables: {
                            input: {
                                id: generateUUID(),
                                project_name: projectName.trim(),
                            },
                        },
                    }),
                });

                const payload = await response.json();

                if (payload.errors?.length) {
                    const errorMsg = payload.errors[0]?.message || 'Unknown error';
                    if (errorMsg.includes('DuplicateItem') || errorMsg.includes('unique')) {
                        return { success: 'skipped', message: `Already exists: ${projectName}` };
                    }
                    return { success: false, message: errorMsg };
                }

                if (payload.data?.createProject) {
                    return { success: true, message: `Created: ${projectName}` };
                }

                return { success: false, message: 'No data returned' };
            } catch (error) {
                return { success: false, message: error.message };
            }
        }

        async function createSingleProject() {
            const nameInput = document.getElementById('projectName');
            const projectName = nameInput.value.trim();

            if (!projectName) {
                showStatus('Please enter a project name', 'error');
                return;
            }

            const createBtn = event.target;
            createBtn.disabled = true;

            showStatus('Creating project...', 'info');
            const result = await createProject(projectName);

            if (result.success === true) {
                showStatus(`✓ ${result.message}`, 'success');
                nameInput.value = '';
            } else if (result.success === 'skipped') {
                showStatus(`⊘ ${result.message}`, 'info');
            } else {
                showStatus(`✗ Error: ${result.message}`, 'error');
            }

            createBtn.disabled = false;
        }

        async function createBatchProjects() {
            const textarea = document.getElementById('projectList');
            const projectNames = textarea.value
                .split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);

            if (projectNames.length === 0) {
                showStatus('Please enter at least one project name', 'error');
                return;
            }

            const createBtn = event.target;
            createBtn.disabled = true;

            showProgress(0, projectNames.length);
            const results = [];

            for (let i = 0; i < projectNames.length; i++) {
                const projectName = projectNames[i];
                const result = await createProject(projectName);
                results.push({ name: projectName, ...result });
                showProgress(i + 1, projectNames.length);
                await new Promise(resolve => setTimeout(resolve, 200)); // Delay to avoid rate limiting
            }

            createBtn.disabled = false;
            hideProgress();

            const successCount = results.filter(r => r.success === true).length;
            const skippedCount = results.filter(r => r.success === 'skipped').length;
            const failureCount = results.filter(r => r.success === false).length;

            showResults(results);

            if (failureCount === 0) {
                showStatus(`✓ Done! Created ${successCount} project(s), ${skippedCount} already exist`, 'success');
                textarea.value = '';
            } else {
                showStatus(`Created ${successCount}, Skipped ${skippedCount}, Failed ${failureCount}`, 'error');
            }
        }

        function showStatus(message, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = message;
            el.className = `status-message ${type}`;
        }

        function showProgress(current, total) {
            const container = document.getElementById('progressContainer');
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');

            container.style.display = 'block';
            const percentage = (current / total) * 100;
            fill.style.width = percentage + '%';
            text.textContent = `Processing ${current} of ${total}...`;
        }

        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
        }

        function showResults(results) {
            const list = document.getElementById('resultsList');
            const content = document.getElementById('resultsContent');

            content.innerHTML = results.map(r => {
                let statusClass = 'error';
                let icon = '✗';
                if (r.success === true) {
                    statusClass = 'success';
                    icon = '✓';
                } else if (r.success === 'skipped') {
                    statusClass = 'skipped';
                    icon = '⊘';
                }
                return `<div class="result-item ${statusClass}">${icon} ${r.message}</div>`;
            }).join('');

            list.classList.add('show');
        }

        function clearForm() {
            document.getElementById('projectName').value = '';
            document.getElementById('statusMessage').className = 'status-message';
        }

        function clearBatchForm() {
            document.getElementById('projectList').value = '';
            document.getElementById('statusMessage').className = 'status-message';
            document.getElementById('resultsList').classList.remove('show');
        }
    </script>
</body>
</html>
